# Servicio dedicado al worker de WhatsApp (Baileys) en Railway.
# En el servicio whatsapp-worker define: NIXPACKS_CONFIG_FILE=nixpacks.toml

[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run whatsapp:worker"
healthcheckPath = "/live"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
