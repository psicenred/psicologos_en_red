<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ED87AF">
    <title>Blog - Psicólogos en Red</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/estilos.css">
    <link rel="stylesheet" href="/chat-widget.css">
    <style>
        .blog-main { background: linear-gradient(180deg, #fff8fb 0%, #ffffff 45%); min-height: 100vh; }
        .blog-wrap { max-width: 1120px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }
        .blog-hero {
            border: 1px solid rgba(237, 135, 175, 0.22);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            border-radius: 26px;
            padding: 2.2rem 1.4rem;
            box-shadow: 0 20px 50px rgba(30, 20, 28, 0.07);
            margin-bottom: 1.6rem;
        }
        .blog-kicker { display: inline-flex; gap: 8px; font-size: 0.8rem; font-weight: 700; color: #8b4b66; background: #ffeaf3; border-radius: 999px; padding: 0.45rem 0.75rem; margin-bottom: 1rem; }
        .blog-title { font-size: clamp(2rem, 4.2vw, 3.2rem); line-height: 1.1; margin: 0 0 0.8rem; color: #2e2630; }
        .blog-subtitle { margin: 0; font-size: clamp(1rem, 2vw, 1.15rem); color: #5f5561; max-width: 760px; }
        .blog-filtros {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: minmax(260px, 1.6fr) minmax(120px, 0.7fr) minmax(120px, 0.7fr) auto;
            gap: 6px;
            align-items: center;
        }
        .blog-filtros input, .blog-filtros button {
            border: 1px solid #eadbe3;
            border-radius: 12px;
            padding: 8px 10px;
            font-size: 0.86rem;
            width: 100%;
            min-height: 36px;
        }
        #filtro-desde, #filtro-hasta {
            max-width: 150px;
            justify-self: end;
        }
        #filtro-desde {
            margin-left: 0;
            position: relative;
            left: 60px;
        }
        .blog-filtros button {
            background: #fff;
            cursor: pointer;
            color: #7a4761;
            font-weight: 600;
            width: auto;
            padding: 8px 12px;
            justify-self: end;
        }
        .blog-filtros button:hover { border-color: #d08baa; }
        .blog-resultado { margin-top: 0.85rem; font-size: 0.88rem; color: #756975; }
        .blog-grid { margin-top: 1.25rem; display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .blog-card {
            background: #fff;
            border: 1px solid #efe3ea;
            border-radius: 20px;
            padding: 1rem;
            box-shadow: 0 8px 22px rgba(18, 11, 19, 0.05);
            display: flex;
            flex-direction: column;
        }
        .blog-card-cover {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 0.8rem;
            background: #f7f1f5;
        }
        .blog-card .tag { display: inline-block; font-size: 0.74rem; font-weight: 700; color: #7d4d65; background: #fff2f8; border-radius: 999px; padding: 0.35rem 0.62rem; margin-bottom: 0.55rem; }
        .blog-card h2 { margin: 0 0 0.45rem; font-size: 1.08rem; line-height: 1.35; color: #2e2630; }
        .blog-card p { margin: 0 0 0.65rem; color: #655b67; font-size: 0.92rem; line-height: 1.55; }
        .blog-meta { font-size: 0.82rem; color: #8a7e88; margin-top: auto; }
        .blog-card-actions { margin-top: 0.75rem; }
        .blog-card-actions button {
            border: none;
            background: #fdf0f6;
            color: #7c3f60;
            border-radius: 999px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .blog-empty {
            border: 1px dashed #e4ccd8;
            background: #fff;
            border-radius: 18px;
            padding: 1.2rem;
            color: #7b6d77;
        }
        .blog-articulo-view { display: none; margin-top: 1.2rem; }
        .blog-articulo-view.visible { display: block; }
        .blog-articulo-back {
            border: none;
            background: #f7ebf2;
            color: #7c3f60;
            border-radius: 999px;
            padding: 8px 14px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .blog-articulo-card {
            background: #fff;
            border: 1px solid #efe3ea;
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: 0 10px 24px rgba(18, 11, 19, 0.05);
        }
        .blog-articulo-card h2 { margin: 0.2rem 0 0.8rem; font-size: clamp(1.4rem, 3vw, 2rem); color: #2e2630; }
        .blog-articulo-content { color: #3c3340; line-height: 1.72; }
        .blog-articulo-content .ql-align-center { text-align: center; }
        .blog-articulo-content .ql-align-right { text-align: right; }
        .blog-articulo-content .ql-align-justify { text-align: justify; }
        .blog-articulo-content img { max-width: 100%; height: auto; display: block; margin: 12px 0; border-radius: 10px; }
        .blog-articulo-content table { border-collapse: collapse; border: 2px solid #000; margin: 10px 0; }
        .blog-articulo-content th,
        .blog-articulo-content td { border: 2px solid #000; padding: 8px 10px; background: #f5f5f5; min-width: 90px; }
        @media (max-width: 500px) {
            .blog-articulo-content table {
                display: block;
                max-width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .blog-articulo-content table tbody {
                display: table;
                min-width: 100%;
            }
            .blog-articulo-content th,
            .blog-articulo-content td {
                white-space: normal;
                word-break: normal;
                overflow-wrap: break-word;
                hyphens: auto;
            }
        }
        @media (max-width: 820px) {
            .blog-filtros {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
                align-items: stretch;
            }
            .blog-filtros #filtro-texto {
                grid-column: 1 / -1;
            }
            .blog-filtros #filtro-desde,
            .blog-filtros #filtro-hasta {
                max-width: none;
                justify-self: stretch;
                left: 0;
                position: static;
            }
            .blog-filtros #btn-limpiar-filtros {
                grid-column: 1 / -1;
                justify-self: stretch;
                width: 100%;
            }
        }
        @media (max-width: 500px) {
            .blog-filtros {
                grid-template-columns: 1fr;
            }
            .blog-filtros #filtro-texto,
            .blog-filtros #filtro-desde,
            .blog-filtros #filtro-hasta,
            .blog-filtros #btn-limpiar-filtros {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <script>if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) document.body.classList.add('pwa-standalone');</script>
    <header class="main-header">
        <a href="/" class="logo" style="color: var(--primario-rosa); text-decoration: none; display: flex; align-items: center; gap: 10px;">
            <img src="/images/logo.png" alt="Logo" style="height: 40px; width: auto;">
            <span>Psicólogos en Red</span>
        </a>
        <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true" tabindex="-1">
        <label for="nav-toggle" class="nav-toggle-label" aria-label="Abrir menú"><span></span><span></span><span></span></label>
        <nav class="main-nav">
            <ul style="display: flex; list-style: none; gap: 25px; align-items: center;">
                <li class="nav-hide-in-pwa"><a href="/" style="text-decoration: none; color: var(--texto-oscuro); font-weight: 500;">Inicio</a></li>
                <li><a href="/catalogo" style="text-decoration: none; color: var(--texto-oscuro); font-weight: 500;">Psicólogos</a></li>
                <li class="nav-hide-in-pwa"><a href="/academia" style="text-decoration: none; color: var(--texto-oscuro); font-weight: 500;">Academia</a></li>
                <li><a href="/blog" style="text-decoration: none; color: var(--primario-rosa); font-weight: 700;">Blog</a></li>
                <li><a href="/perfil" class="btn-perfil" style="background: var(--primario-rosa); color: white; padding: 8px 18px; border-radius: 20px; text-decoration: none;">Mi Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="blog-main">
        <div class="blog-wrap">
            <section class="blog-hero">
                <span class="blog-kicker">BLOG · SALUD MENTAL</span>
                <h1 class="blog-title">Contenido práctico para cuidar tu bienestar.</h1>
                <p class="blog-subtitle">Busca por título o palabra clave y filtra por fecha de publicación en tiempo real.</p>
                <div class="blog-filtros">
                    <input type="text" id="filtro-texto" placeholder="Buscar por título o palabra clave (ej. amor)">
                    <input type="date" id="filtro-desde" aria-label="Fecha desde">
                    <input type="date" id="filtro-hasta" aria-label="Fecha hasta">
                    <button type="button" id="btn-limpiar-filtros">Limpiar</button>
                </div>
                <p class="blog-resultado" id="blog-resultado">Cargando artículos...</p>
            </section>

            <section class="blog-grid" id="blog-grid"></section>
            <section class="blog-articulo-view" id="blog-articulo-view">
                <button type="button" class="blog-articulo-back" id="blog-articulo-volver">← Volver al blog</button>
                <article class="blog-articulo-card">
                    <h2 id="blog-articulo-title">Artículo</h2>
                    <p class="blog-meta" id="blog-articulo-meta"></p>
                    <div class="blog-articulo-content" id="blog-articulo-content"></div>
                </article>
            </section>
        </div>
    </main>

    <script src="/i18n.js"></script>
    <script src="/chat-widget.js"></script>
    <script src="/pwa-register.js"></script>
    <script>
        let articulos = [];

        function formatearFecha(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return 'Fecha no disponible';
            return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function matchesFecha(art, desde, hasta) {
            const f = new Date(art.fecha_publicacion);
            if (Number.isNaN(f.getTime())) return true;
            const solo = new Date(f.getFullYear(), f.getMonth(), f.getDate()).getTime();
            if (desde) {
                const fd = new Date(desde + 'T00:00:00').getTime();
                if (solo < fd) return false;
            }
            if (hasta) {
                const fh = new Date(hasta + 'T23:59:59').getTime();
                if (solo > fh) return false;
            }
            return true;
        }

        function filtrarArticulos() {
            const txt = (document.getElementById('filtro-texto').value || '').trim().toLowerCase();
            const desde = document.getElementById('filtro-desde').value;
            const hasta = document.getElementById('filtro-hasta').value;
            const filtrados = articulos.filter((a) => {
                const kw = Array.isArray(a.palabras_clave) ? a.palabras_clave.join(' ') : '';
                const stack = (a.titulo + ' ' + kw).toLowerCase();
                const coincideTexto = !txt || stack.includes(txt);
                const coincideFecha = matchesFecha(a, desde, hasta);
                return coincideTexto && coincideFecha;
            });
            renderizar(filtrados);
        }

        function renderizar(items) {
            const grid = document.getElementById('blog-grid');
            const estado = document.getElementById('blog-resultado');
            estado.textContent = 'Mostrando ' + items.length + ' artículo' + (items.length === 1 ? '' : 's') + '.';
            if (!items.length) {
                grid.innerHTML = '<div class="blog-empty">No encontramos artículos con esos filtros. Prueba con otra palabra o rango de fechas.</div>';
                return;
            }
            grid.innerHTML = items.map((a) => {
                const etiqueta = Array.isArray(a.palabras_clave) && a.palabras_clave.length ? a.palabras_clave[0] : 'Blog';
                const extracto = a.extracto || 'Sin extracto.';
                const img = a.portada_url ? '<img class="blog-card-cover" src="' + a.portada_url + '" alt="Portada de artículo">' : '';
                const href = a.slug ? ('/blog/' + encodeURIComponent(a.slug)) : '#';
                return (
                    '<article class="blog-card">' +
                        img +
                        '<span class="tag">' + etiqueta + '</span>' +
                        '<h2>' + (a.titulo || 'Sin título') + '</h2>' +
                        '<p>' + extracto + '</p>' +
                        '<p class="blog-meta">Publicado: ' + formatearFecha(a.fecha_publicacion) + (a.tiempo_lectura ? (' · ' + a.tiempo_lectura + ' min') : '') + '</p>' +
                        '<div class="blog-card-actions"><a href="' + href + '" target="_blank" rel="noopener" style="display:inline-block; text-decoration:none; border:none; background:#fdf0f6; color:#7c3f60; border-radius:999px; padding:8px 12px; cursor:pointer; font-weight:600;">Leer artículo</a></div>' +
                    '</article>'
                );
            }).join('');
        }

        async function cargarArticulos() {
            try {
                const res = await fetch('/api/blog-articulos');
                if (!res.ok) throw new Error('Error al cargar');
                articulos = await res.json();
                const path = window.location.pathname || '';
                const m = path.match(/^\/blog\/([^/]+)$/);
                if (m && m[1]) {
                    const slug = decodeURIComponent(m[1]).toLowerCase();
                    const art = articulos.find((x) => String(x.slug || '').toLowerCase() === slug);
                    if (art) {
                        abrirVistaArticulo(art);
                        if (art.meta_title) document.title = art.meta_title + ' - Psicólogos en Red';
                        const descMeta = document.querySelector('meta[name="description"]');
                        if (descMeta && art.meta_description) descMeta.setAttribute('content', art.meta_description);
                        return;
                    }
                }
                filtrarArticulos();
            } catch (e) {
                document.getElementById('blog-grid').innerHTML = '<div class="blog-empty">No pudimos cargar los artículos en este momento.</div>';
                document.getElementById('blog-resultado').textContent = 'Error al cargar.';
            }
        }

        function abrirVistaArticulo(art) {
            const hero = document.querySelector('.blog-hero');
            const grid = document.getElementById('blog-grid');
            const view = document.getElementById('blog-articulo-view');
            if (hero) hero.style.display = 'none';
            if (grid) grid.style.display = 'none';
            document.getElementById('blog-articulo-title').textContent = art.titulo || 'Artículo';
            const autor = art.autor || 'Equipo Psicólogos en Red';
            const lectura = art.tiempo_lectura ? (' · ' + art.tiempo_lectura + ' min de lectura') : '';
            document.getElementById('blog-articulo-meta').textContent = 'Publicado: ' + formatearFecha(art.fecha_publicacion) + ' · ' + autor + lectura;
            document.getElementById('blog-articulo-content').innerHTML = art.contenido_html || '<p>Sin contenido.</p>';
            view.classList.add('visible');
        }

        document.addEventListener('DOMContentLoaded', function() {
            cargarArticulos();
            document.getElementById('filtro-texto').addEventListener('input', filtrarArticulos);
            document.getElementById('filtro-desde').addEventListener('change', filtrarArticulos);
            document.getElementById('filtro-hasta').addEventListener('change', filtrarArticulos);
            document.getElementById('btn-limpiar-filtros').addEventListener('click', function() {
                document.getElementById('filtro-texto').value = '';
                document.getElementById('filtro-desde').value = '';
                document.getElementById('filtro-hasta').value = '';
                filtrarArticulos();
            });
            const btnVolver = document.getElementById('blog-articulo-volver');
            if (btnVolver) {
                btnVolver.addEventListener('click', function() {
                    window.location.href = '/blog';
                });
            }
        });
    </script>
</body>
</html>
